<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Session Coach</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="coach.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>Autodarts Session Coach</h1>
        <p>Leg-based match tracking, goals, training plans, debug capture and checkout advice.</p>
      </div>
      <div class="hero-actions">
        <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
        <button id="exportDataBtn" class="ghost-btn" type="button">Export data</button>
        <button id="importDataBtn" class="ghost-btn" type="button">Import data</button>
        <button id="clearDebugBtn" class="ghost-btn" type="button">Clear debug log</button>
        <input id="importFileInput" type="file" accept="application/json" hidden>
      </div>
    </header>
    <p id="pageStatus" class="hero-status"></p>

    <nav class="tab-bar" aria-label="Session Coach sections">
      <button class="tab-btn is-active" data-tab="overview" type="button">Coach</button>
      <button class="tab-btn" data-tab="training" type="button">Training</button>
    </nav>

    <section id="tab-overview" class="tab-pane is-active">
      <section class="section">
        <h2>Today</h2>
        <div id="todayCard" class="card"></div>
      </section>

      <section class="section">
        <h2>Matches today</h2>
        <div id="historyGrid" class="history-grid"></div>
      </section>

      <section class="section">
        <h2>Leg targets</h2>
        <div class="card">
          <div class="settings-toolbar">
            <div class="preset-row">
              <button class="preset-btn" data-preset="starter" type="button">Starter</button>
              <button class="preset-btn" data-preset="solid" type="button">Solid</button>
              <button class="preset-btn" data-preset="push" type="button">Push</button>
            </div>
            <button id="saveSettingsBtn" class="ghost-btn" type="button">Save targets</button>
          </div>
          <div class="settings-grid">
            <label class="settings-field"><span>Average over</span><input id="averageOver" type="number" step="0.1" min="0"></label>
            <label class="settings-field"><span>First 9 over</span><input id="first9Over" type="number" step="0.1" min="0"></label>
            <label class="settings-field"><span>Checkout darts under</span><input id="checkoutDartsUnder" type="number" step="0.1" min="0"></label>
            <label class="settings-field"><span>Max busts</span><input id="maxBusts" type="number" step="1" min="0"></label>
          </div>
          <p id="settingsStatus" class="settings-status"></p>
        </div>
      </section>

      <section class="section">
        <h2>Runtime / adapter state</h2>
        <div id="runtimeCard" class="card mono"></div>
      </section>

      <section class="section">
        <h2>Debug log</h2>
        <div id="debugLog" class="card mono"></div>
      </section>
    </section>

    <section id="tab-training" class="tab-pane">
      <section class="section">
        <h2>Training plans</h2>
        <div class="card">
          <div class="training-toolbar">
            <div class="training-plan-picker">
              <label class="settings-field compact-field">
                <span>Choose plan</span>
                <select id="trainingPlanSelect"></select>
              </label>
            </div>
            <div class="training-actions">
              <button id="newAttemptBtn" class="ghost-btn" type="button">New attempt</button>
              <button id="resetTrainingBtn" class="ghost-btn" type="button">Reset</button>
              <button id="saveTrainingBtn" class="ghost-btn" type="button">Save attempt</button>
            </div>
          </div>
          <p id="trainingDescription" class="settings-status"></p>
          <div id="trainingSummary" class="grid training-summary"></div>
          <div id="trainingTableWrap" class="training-table-wrap"></div>
          <p id="trainingStatus" class="settings-status"></p>
        </div>
      </section>

      <section class="section">
        <h2>Saved attempts</h2>
        <div id="trainingHistory" class="history-grid"></div>
      </section>
    </section>
  </main>

  <script src="shared.js"></script>
  <script src="coach.js"></script>
</body>
</html>
